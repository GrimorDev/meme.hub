events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml application/manifest+json;
    gzip_min_length 1000;

    # MIME type dla PWA manifest
    types {
        application/manifest+json  webmanifest;
    }

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Service Worker — nigdy nie keszuj
        location ~* (sw\.js|workbox-.*\.js)$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            expires 0;
            try_files $uri =404;
        }

        # PWA Manifest — krótki keszuj
        location ~* \.webmanifest$ {
            add_header Content-Type "application/manifest+json";
            add_header Cache-Control "public, max-age=3600";
            try_files $uri =404;
        }

        # Ikony PWA — długi keszuj
        location /icons/ {
            add_header Cache-Control "public, max-age=604800, immutable";
            try_files $uri =404;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://backend:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;
            proxy_cookie_path / /;
            client_max_body_size 15m;
        }

        location /uploads/ {
            proxy_pass http://backend:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=604800";
        }

        # Pliki do pobrania (instalatory aplikacji desktopowej)
        location /downloads/ {
            alias /downloads/;
            default_type application/octet-stream;
            add_header Content-Disposition 'attachment';
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
}
