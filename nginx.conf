events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;

    # ── Kompresja gzip ────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        text/xml
        application/xml
        image/svg+xml
        application/manifest+json
        font/woff2;
    gzip_min_length 1000;

    # MIME type dla PWA manifest
    types {
        application/manifest+json  webmanifest;
    }

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # ── Service Worker — nigdy nie keszuj ──────────────────────
        location ~* (sw\.js|workbox-.*\.js|registerSW\.js)$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            expires 0;
            try_files $uri =404;
        }

        # ── index.html — nie keszuj ─────────────────────────────────
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;
            try_files $uri =404;
        }

        # ── Vite assets — hash w nazwie = bezpieczne na rok ────────
        location /assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # ── PWA Manifest ────────────────────────────────────────────
        location ~* \.webmanifest$ {
            add_header Content-Type "application/manifest+json";
            add_header Cache-Control "public, max-age=3600";
            try_files $uri =404;
        }

        # ── Ikony PWA — długi keszuj ────────────────────────────────
        location /icons/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # ── API proxy ────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://backend:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;
            proxy_cookie_path / /;
            client_max_body_size 55m;
        }

        # ── Uploads — ^~ ma priorytet nad regex, proxy do backendu ──
        # WAŻNE: ^~ blokuje dopasowanie przez regex location niżej
        location ^~ /uploads/ {
            proxy_pass http://backend:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ── Pliki do pobrania (instalatory) ─────────────────────────
        location /downloads/ {
            alias /downloads/;
            default_type application/octet-stream;
            add_header Content-Disposition 'attachment';
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
