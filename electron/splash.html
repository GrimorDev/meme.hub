<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Memster</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw;
      height: 100vh;
      background: transparent;
      overflow: hidden;
      -webkit-app-region: drag;
    }

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0c;
      border-radius: 22px;
      border: 1px solid rgba(147, 51, 234, 0.28);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.8),
        0 0 50px rgba(147, 51, 234, 0.18),
        0 30px 70px rgba(0, 0, 0, 0.95),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
      animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ── Logo ── */
    .logo-wrap {
      position: relative;
      animation: float 1.7s ease-in-out infinite;
    }

    .logo-glow {
      position: absolute;
      inset: -12px;
      border-radius: 30px;
      background: radial-gradient(ellipse at center, rgba(147, 51, 234, 0.35) 0%, transparent 70%);
      animation: glowPulse 1.7s ease-in-out infinite;
    }

    .logo {
      position: relative;
      width: 90px;
      height: 90px;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(147, 51, 234, 0.35);
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Tekst ── */
    .name {
      margin-top: 20px;
      font-size: 23px;
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-style: italic;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
    }

    .tagline {
      margin-top: 5px;
      font-size: 9.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.28em;
      color: #3f3f46;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── Dots ── */
    .dots-row {
      margin-top: 36px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #7c3aed;
      animation: dotBounce 1.2s ease-in-out infinite;
    }

    .dot:nth-child(2) {
      animation-delay: 0.15s;
      background: #9333ea;
    }

    .dot:nth-child(3) {
      animation-delay: 0.3s;
      background: #a855f7;
    }

    .dots-label {
      margin-left: 7px;
      font-size: 9.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: #3f3f46;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── Keyframes ── */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-13px); }
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.5; transform: scale(0.95); }
      50%       { opacity: 1;   transform: scale(1.05); }
    }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0.55); opacity: 0.25; }
      40%            { transform: scale(1);    opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.94); }
      to   { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="logo-wrap">
      <div class="logo-glow"></div>
      <div class="logo">
        <img src="./icon.png" alt="Memster" />
      </div>
    </div>

    <div class="name">MEMSTER</div>
    <div class="tagline">Społeczność memów</div>

    <div class="dots-row">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dots-label">Ładowanie</div>
    </div>

  </div>
</body>
</html>
