<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Memster</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw;
      height: 100vh;
      background: transparent;
      overflow: hidden;
      -webkit-app-region: drag;
    }

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0c0c0f;
      border-radius: 24px;
      border: 1px solid rgba(147, 51, 234, 0.22);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.9),
        0 0 80px rgba(124, 58, 237, 0.12),
        0 40px 80px rgba(0, 0, 0, 0.98);
      animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
      transition: opacity 0.35s ease;
    }

    .container.fade-out {
      opacity: 0;
      transform: scale(0.97);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    /* ── Ring SVG ── */
    .ring-wrap {
      position: relative;
      width: 110px;
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring-svg {
      position: absolute;
      inset: 0;
      width: 110px;
      height: 110px;
      transform: rotate(-90deg);
    }

    .ring-track {
      fill: none;
      stroke: rgba(124, 58, 237, 0.12);
      stroke-width: 2;
    }

    .ring-progress {
      fill: none;
      stroke: url(#ringGrad);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-dasharray: 314;
      stroke-dashoffset: 314;
      animation: ringFill 1.9s cubic-bezier(0.4, 0, 0.2, 1) 0.2s forwards;
    }

    /* ── Logo ── */
    .logo {
      position: relative;
      width: 78px;
      height: 78px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(147, 51, 234, 0.3);
      box-shadow:
        0 0 24px rgba(124, 58, 237, 0.25),
        inset 0 1px 0 rgba(255,255,255,0.06);
      animation: logoPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Tekst ── */
    .name {
      margin-top: 22px;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.25s both;
    }

    .tagline {
      margin-top: 6px;
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: rgba(147, 51, 234, 0.55);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.35s both;
    }

    /* ── Progress bar ── */
    .progress-wrap {
      position: absolute;
      bottom: 28px;
      left: 36px;
      right: 36px;
      height: 2px;
      background: rgba(255,255,255,0.04);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: 2px;
      background: linear-gradient(90deg, #7c3aed, #a855f7);
      animation: progressFill 1.85s cubic-bezier(0.4, 0, 0.2, 1) 0.15s forwards;
      box-shadow: 0 0 8px rgba(168, 85, 247, 0.5);
    }

    /* ── Keyframes ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes logoPop {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes ringFill {
      from { stroke-dashoffset: 314; }
      to   { stroke-dashoffset: 0; }
    }

    @keyframes progressFill {
      from { width: 0%; }
      to   { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container" id="container">

    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 110 110">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#7c3aed" />
            <stop offset="100%" stop-color="#c084fc" />
          </linearGradient>
        </defs>
        <circle class="ring-track"    cx="55" cy="55" r="50" />
        <circle class="ring-progress" cx="55" cy="55" r="50" />
      </svg>

      <div class="logo">
        <img src="./icon.png" alt="Memster" />
      </div>
    </div>

    <div class="name">MEMSTER</div>
    <div class="tagline">Społeczność memów</div>

    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>

  </div>

  <script>
    // Fade-out po sygnale od main.js
    window.addEventListener('message', (e) => {
      if (e.data === 'close') {
        document.getElementById('container').classList.add('fade-out');
      }
    });
  </script>
</body>
</html>
